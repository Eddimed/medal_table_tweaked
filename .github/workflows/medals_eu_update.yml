name: Update EU Medal Tables

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-medals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Quick ETag check
        id: etag_olympics
        run: python tools/medals/etag_check.py --event olympics

      - name: Quick ETag check (Paralympics)
        id: etag_paralympics
        run: python tools/medals/etag_check.py --event paralympics

      - name: Install dependencies
        if: steps.etag_olympics.outputs.changed == 'true' || steps.etag_paralympics.outputs.changed == 'true'
        run: pip install -r tools/medals/requirements.txt

      - name: Fetch Olympic medal table
        if: steps.etag_olympics.outputs.changed == 'true'
        run: python tools/medals/fetch_medals.py --event olympics

      - name: Fetch Paralympic medal table
        if: steps.etag_paralympics.outputs.changed == 'true'
        run: python tools/medals/fetch_medals.py --event paralympics

      - name: Commit changes
        if: steps.etag_olympics.outputs.changed == 'true' || steps.etag_paralympics.outputs.changed == 'true'
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/medals_eu.csv data/medals_eu.json data/medals_meta.json data/medals_eu_paralympics.csv data/medals_eu_paralympics.json data/medals_meta_paralympics.json data/ioc_codes.csv
          git commit -m "Update medal tables"
          git push
